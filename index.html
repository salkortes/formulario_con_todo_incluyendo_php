<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Formulario email</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head> 
<body>
  <h1>Formulario de registro</h1>

  <form id="formulario" action="procesar.php" method="POST" novalidate >
    <fieldset>
    <legend>Alta de usuario</legend>
    
    <label for="usuario">Usuario:</label><br>
    <input type="text" id="usuario" name="usuario" placeholder="Introduce tu nombre de usuario" required minlength="4" maxlength="12">
    <span class="error" id="errorUsuario"></span><br><br>

    <label for="dni">DNI:</label><br>
    <input type="text" id="dni" name="dni" placeholder="12345678A" required minlength="9" maxlength="9"> <!-- Después, la validación será total con la Regex, pero considero buena práxis incluir esta en HTML-->
    <span class="error" id="errorDni"></span><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="tuemail@email.com" required>
    <span class="error" id="errorEmail"></span><br><br>

    <label>Selecciona tu país
    <select id="pais" name="pais" required>
                    <option value="">Selecciona uno</option>
                    <option value="españa">España</option>
                    <option value="francia">Francia</option>
                    <option value="alemania">Alemania</option>
                    <option value="italia">italia</option>
                    <option value="portugal">Portugal</option>
                </select>
                <span class="error" id="errorPais"></span>
            </label> <br><br>

    <label for="edad">Edad:</label><br>
    <input type="number" id="edad" name="edad" placeholder="Edad" required min="18" max="120"> 
    <span class="error" id="errorEdad"></span><br><br>

    <label for="password">  Contraseña</label><br>
    <input type="password" id="password" name ="password" placeholder="Introduce tu contraseña" required minlength="6" maxlength="15">
    <span class="error" id="errorPassword"></span><br><br>

    <label for = "terminos"> 
    <input type="checkbox" id="terminos" name = "terminos" required> Acepto los términos y condiciones</label>
    <span class="mensaje-error" id="errorTerminos"></span> <br><br>

    <button type="submit">Enviar</button>
    </fieldset>
 
® Formulario creado por Salva D´Or
  <script src="script.js"></script>
</form>
</body>

</html>
